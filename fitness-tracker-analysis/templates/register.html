{% extends 'base.html' %}
{% block title %}Register · Fitness Tracker{% endblock %}
{% block content %}
  <h1>Register</h1>
  <form method="post" action="/register" class="card form">
    <label>Username
      <input name="username" type="text" required>
    </label>
    <label>Password
      <input name="password" type="password" required>
    </label>
    <label>Weight (kg)
      <input name="weight_kg" type="number" step="0.1" required>
    </label>
    <label>Height (cm)
      <input name="height_cm" type="number" step="0.1" required>
    </label>
    <label>Age
      <input name="age" type="number" min="10" max="120" required>
    </label>
    <label>Gender
      <select name="gender" required>
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>
    </label>
    <label>Activity Level
      <select name="activity_level" required>
        <option value="sedentary">Sedentary (little or no exercise)</option>
        <option value="lightly_active">Lightly Active (exercise 1-3 days/week)</option>
        <option value="moderately_active">Moderately Active (exercise 3-5 days/week)</option>
        <option value="very_active">Very Active (exercise 6-7 days/week)</option>
        <option value="extra_active">Extra Active (intense exercise daily)</option>
      </select>
    </label>
    <label>Goal
      <select name="goal">
        <option value="cut">Cut</option>
        <option value="bulk">Bulk</option>
      </select>
    </label>
    <button type="submit">Create account</button>
  </form>
{% endblock %}
