{% extends 'base.html' %}
{% block title %}Login · Fitness Tracker{% endblock %}
{% block content %}
  <h1>Login</h1>
  <form method="post" action="/login" class="card form">
    <label>Username
      <input name="username" type="text" required>
    </label>
    <label>Password
      <input name="password" type="password" required>
    </label>
    <button type="submit">Log in</button>
  </form>
{% endblock %}
